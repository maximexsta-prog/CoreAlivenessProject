<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="robots" content="noindex, nofollow, noarchive">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Mt. Saint-Anne — Dashboard Logis</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0d1117; --panel:#161b22; --panel2:#1c2230; --line:#252c3a;
  --txt:#e6edf3; --dim:#8b97a8; --faint:#5b6677;
  --green:#3fb950; --green-bg:rgba(63,185,80,.12);
  --yellow:#d29922; --yellow-bg:rgba(210,153,34,.12);
  --red:#f85149; --red-bg:rgba(248,81,73,.12);
  --blue:#58a6ff; --blue-bg:rgba(88,166,255,.12);
  --accent:#7ee2b8;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--txt);font:14px/1.5 Inter,system-ui,sans-serif;padding:28px 32px 60px}
a{color:var(--blue);text-decoration:none}
header{display:flex;align-items:baseline;gap:16px;flex-wrap:wrap;margin-bottom:6px}
h1{font-size:26px;font-weight:800;letter-spacing:-.5px}
.sub{color:var(--dim);font-size:13px;margin-bottom:22px}
.live{display:inline-flex;align-items:center;gap:7px;font-size:12px;color:var(--dim);background:var(--panel);border:1px solid var(--line);border-radius:99px;padding:4px 12px}
.dot{width:8px;height:8px;border-radius:50%;background:var(--green);box-shadow:0 0 8px var(--green);animation:pulse 2s infinite}
.dot.err{background:var(--red);box-shadow:0 0 8px var(--red);animation:none}
@keyframes pulse{50%{opacity:.4}}
.toolbar{margin-left:auto;display:flex;gap:10px;align-items:center}
.btn{background:var(--panel);border:1px solid var(--line);color:var(--txt);border-radius:8px;padding:6px 14px;font-size:12.5px;cursor:pointer;font-family:inherit}
.btn:hover{border-color:var(--blue)}
/* hero */
.hero{display:grid;grid-template-columns:repeat(auto-fit,minmax(190px,1fr));gap:14px;margin-bottom:26px}
.card{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:16px 18px}
.card .k{font-size:11px;text-transform:uppercase;letter-spacing:.8px;color:var(--faint);font-weight:600;margin-bottom:8px}
.card .v{font-size:22px;font-weight:700;line-height:1.25}
.card .v.small{font-size:14.5px;font-weight:600}
.card.red .v{color:var(--red)} .card.green .v{color:var(--green)} .card.yellow .v{color:var(--yellow)} .card.blue .v{color:var(--blue)}
/* layout */
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(420px,1fr));gap:18px}
section{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:18px 20px;overflow:auto}
section.wide{grid-column:1/-1}
h2{font-size:15px;font-weight:700;margin-bottom:12px;display:flex;align-items:center;gap:8px}
h2 .n{color:var(--accent);font-family:'JetBrains Mono',monospace;font-size:12px}
table{width:100%;border-collapse:collapse;font-size:13px}
th{text-align:left;color:var(--faint);font-size:11px;text-transform:uppercase;letter-spacing:.6px;padding:6px 10px 8px;border-bottom:1px solid var(--line);white-space:nowrap}
td{padding:8px 10px;border-bottom:1px solid var(--line);vertical-align:top;color:var(--dim)}
td:first-child{color:var(--txt);font-weight:500}
tr:last-child td{border-bottom:none}
tr.changed td{animation:flash 2.5s}
@keyframes flash{0%{background:var(--blue-bg)}100%{background:transparent}}
.pill{display:inline-block;padding:2px 10px;border-radius:99px;font-size:11.5px;font-weight:700;white-space:nowrap}
.p-green{color:var(--green);background:var(--green-bg)}
.p-yellow{color:var(--yellow);background:var(--yellow-bg)}
.p-red{color:var(--red);background:var(--red-bg)}
.p-blue{color:var(--blue);background:var(--blue-bg)}
.p-grey{color:var(--dim);background:var(--panel2)}
.num{font-family:'JetBrains Mono',monospace;font-size:12.5px;text-align:right;white-space:nowrap}
td.num{color:var(--txt)}
.num.pos{color:var(--green)} .num.neg{color:var(--red)}
.kv{display:grid;gap:6px}
.kv .row{display:grid;grid-template-columns:200px 1fr;gap:12px;padding:7px 10px;border-radius:8px;background:var(--panel2)}
.kv .row b{color:var(--dim);font-weight:600;font-size:12.5px}
.note{font-size:12px;color:var(--faint);margin-top:10px;line-height:1.5}
.foot{margin-top:26px;color:var(--faint);font-size:12px;display:flex;gap:16px;flex-wrap:wrap}
#err{display:none;background:var(--red-bg);border:1px solid var(--red);color:var(--red);border-radius:10px;padding:10px 16px;margin-bottom:18px;font-size:13px}
</style>
</head>
<body>
<header>
  <h1>Mt. Saint-Anne — Dashboard Logis</h1>
  <span class="live"><span class="dot" id="dot"></span><span id="livetxt">connexion…</span></span>
  <div class="toolbar">
    <button class="btn" onclick="poll(true)">↻ Actualiser</button>
    <a class="btn" href="https://docs.google.com/spreadsheets/d/1-u1J6LrIUyj7wBG8mHKZt8jIq-T9V6q0w2ebytm9uFI/edit" target="_blank">✎ Modifier dans Sheets</a>
  </div>
</header>
<div class="sub">Miroir en direct de Google Sheets · actualisation toutes les <span id="ivl">10</span>s · les modifications dans Sheets apparaissent ici automatiquement</div>
<div id="err"></div>
<div class="hero" id="hero"></div>
<div class="grid" id="grid"></div>
<div class="foot">
  <span>Source: Google Sheets — onglet « Dashboard Mt. Saint-Anne »</span>
  <span id="stamp"></span>
</div>

<script>
const SHEET_ID = "1-u1J6LrIUyj7wBG8mHKZt8jIq-T9V6q0w2ebytm9uFI";
const SHEET_NAME = "Dashboard Mt. Saint-Anne";
const POLL_MS = 10000;

/* ── JSONP fetch (no CORS, no API key) ── */
let reqSeq = 0;
function fetchSheet() {
  return new Promise((resolve, reject) => {
    const id = "gviz_cb_" + (++reqSeq);
    const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?sheet=${encodeURIComponent(SHEET_NAME)}&headers=1&tqx=out:json;responseHandler:${id}&_=${Date.now()}`;
    const s = document.createElement("script");
    window[id] = resp => { cleanup(); resp.status === "ok" ? resolve(resp.table) : reject(new Error(resp.errors?.[0]?.detailed_message || "sheet error")); };
    function cleanup() { delete window[id]; s.remove(); clearTimeout(t); }
    const t = setTimeout(() => { cleanup(); reject(new Error("timeout")); }, 15000);
    s.onerror = () => { cleanup(); reject(new Error("network / sharing error")); };
    s.src = url; document.head.appendChild(s);
  });
}

const cellV = c => (c && c.v != null) ? String(c.f ?? c.v).trim() : "";
const toRows = table => table.rows.map(r => (r.c || []).map(cellV));
const toHeaders = table => (table.cols || []).map(c => c.label || "");

/* ── column index map ── */
const COL = {
  order: 0, rank: 1, status: 2, dateFound: 3, link: 4,
  owner: 5, address: 6, avail: 7, rent: 8, rooms: 9,
  spots: 10, costMonth: 11, costWeek: 12, furnished: 13,
  flexLease: 14, ownerOpen: 15, contact: 16, nextAction: 17,
  notes: 18, photos: 19, monthlyProfit: 20, yearlyProfit: 21,
  winterVerdict: 22, winterProfit: 23
};

/* ── helpers ── */
const esc = s => String(s).replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));

const statusPill = s => {
  if (!s) return "";
  const l = s.toLowerCase().normalize('NFD').replace(/\p{Diacritic}/gu, '');
  let cls = "p-grey";
  if (/contact/.test(l)) cls = "p-yellow";
  else if (/refus/.test(l)) cls = "p-red";
  else if (/confirm/.test(l)) cls = "p-green";
  else if (/discussion/.test(l)) cls = "p-blue";
  else if (/oui|yes/.test(l)) cls = "p-green";
  else if (/non|no\b/.test(l)) cls = "p-red";
  else if (/confirmer|tbd|waiting|attendre/.test(l)) cls = "p-yellow";
  return `<span class="pill ${cls}">${esc(s)}</span>`;
};

const parseNum = v => {
  const n = parseFloat(String(v || '').replace(/[^0-9.\-]/g, ''));
  return isNaN(n) ? 0 : n;
};

const fmtMoney = n => {
  if (!n) return '—';
  return '$' + Math.round(n).toLocaleString('fr-CA');
};

const numClass = n => n > 0 ? 'num pos' : n < 0 ? 'num neg' : 'num';

/* ── render ── */
let lastSnapshot = "";

function render(rows) {
  const data = rows.filter(r => r.some(c => c)); // skip blank rows

  /* ── Hero KPIs ── */
  const total = data.length;
  const active = data.filter(r => !/refus/i.test(r[COL.status] || '')).length;
  const monthlyProfits = data.map(r => parseNum(r[COL.monthlyProfit])).filter(n => n > 0);
  const yearlyProfits  = data.map(r => parseNum(r[COL.yearlyProfit])).filter(n => n > 0);
  const rents = data.map(r => parseNum(r[COL.rent])).filter(n => n > 0);
  const refused = data.filter(r => /refus/i.test(r[COL.status] || '')).length;

  const bestMonthly = monthlyProfits.length ? Math.max(...monthlyProfits) : 0;
  const bestYearly  = yearlyProfits.length  ? Math.max(...yearlyProfits)  : 0;
  const avgRent     = rents.length ? rents.reduce((a,b)=>a+b,0)/rents.length : 0;

  document.getElementById("hero").innerHTML = [
    ["Propriétés suivies",  total,                 "blue",   false],
    ["Prospects actifs",    active,                "green",  false],
    ["Meilleur profit/mois",fmtMoney(bestMonthly), "green",  true],
    ["Meilleur profit/an",  fmtMoney(bestYearly),  "yellow", true],
    ["Loyer moyen",         fmtMoney(avgRent),     "",       true],
    ["Refusés",             refused,               refused > 0 ? "red" : "", false],
  ].map(([k, v, cls, small]) =>
    `<div class="card ${cls}"><div class="k">${k}</div><div class="v ${small?'small':''}">${v}</div></div>`
  ).join("");

  /* ── Section helpers ── */
  const tbl = (headers, rows, cellFn) =>
    `<table><tr>${headers.map(h=>`<th>${h}</th>`).join('')}</tr>${rows.map(r=>`<tr>${cellFn(r)}</tr>`).join('')}</table>`;

  /* ── 01 Toutes les propriétés ── */
  const sortedData = [...data].sort((a,b) => {
    const ra = parseNum(a[COL.rank]) || 999;
    const rb = parseNum(b[COL.rank]) || 999;
    return ra - rb;
  });

  const propHtml = sortedData.length ? tbl(
    ["#","Statut","Proprio","Adresse / secteur","Dispo","Loyer/mois","Places","Coût/place","Profit/mois","Profit/an","Meublée","Bail flex."],
    sortedData,
    r => {
      const mp = parseNum(r[COL.monthlyProfit]);
      const yp = parseNum(r[COL.yearlyProfit]);
      return `
        <td>${esc(r[COL.rank] || r[COL.order] || '—')}</td>
        <td>${statusPill(r[COL.status])}</td>
        <td>${esc(r[COL.owner] || '—')}</td>
        <td>${esc(r[COL.address] || '—')}</td>
        <td>${esc(r[COL.avail] || '—')}</td>
        <td class="num">${esc(r[COL.rent] || '—')}</td>
        <td class="num">${esc(r[COL.spots] || '—')}</td>
        <td class="num">${esc(r[COL.costMonth] || '—')}</td>
        <td class="${numClass(mp)}">${fmtMoney(mp)}</td>
        <td class="${numClass(yp)}">${fmtMoney(yp)}</td>
        <td>${statusPill(r[COL.furnished])}</td>
        <td>${statusPill(r[COL.flexLease])}</td>`;
    }
  ) : '<div class="note">Aucune propriété.</div>';

  /* ── 02 Prochaines actions ── */
  const actionRows = sortedData.filter(r => r[COL.nextAction]);
  const actionsHtml = actionRows.length ? `<div class="kv">${actionRows.map(r =>
    `<div class="row" style="grid-template-columns:180px 1fr">
      <b>${esc(r[COL.owner] || '—')} <span style="color:var(--faint);font-weight:400">· ${esc(r[COL.address] || '').split('/')[0].trim()}</span></b>
      <span>${esc(r[COL.nextAction])}</span>
    </div>`
  ).join('')}</div>` : '<div class="note">Aucune action définie.</div>';

  /* ── 03 Notes & détails ── */
  const noteRows = sortedData.filter(r => r[COL.notes]);
  const notesHtml = noteRows.length ? `<div class="kv">${noteRows.map(r =>
    `<div class="row" style="grid-template-columns:180px 1fr">
      <b>${esc(r[COL.owner] || '—')}</b>
      <span style="white-space:pre-wrap">${esc(r[COL.notes])}</span>
    </div>`
  ).join('')}</div>` : '<div class="note">Aucune note.</div>';

  /* ── 04 Analyse financière ── */
  const finHtml = sortedData.length ? tbl(
    ["Proprio","Adresse","Loyer/mois","Ch.","Places","Coût/place/mois","Profit/mois","Profit/an","Verdict hiver","Profit hiver/an"],
    sortedData,
    r => {
      const mp = parseNum(r[COL.monthlyProfit]);
      const yp = parseNum(r[COL.yearlyProfit]);
      const wp = parseNum(r[COL.winterProfit]);
      return `
        <td>${esc(r[COL.owner] || '—')}</td>
        <td>${esc(r[COL.address] || '—')}</td>
        <td class="num">${esc(r[COL.rent] || '—')}</td>
        <td class="num">${esc(r[COL.rooms] || '—')}</td>
        <td class="num">${esc(r[COL.spots] || '—')}</td>
        <td class="num">${esc(r[COL.costMonth] || '—')}</td>
        <td class="${numClass(mp)}">${fmtMoney(mp)}</td>
        <td class="${numClass(yp)}">${fmtMoney(yp)}</td>
        <td>${statusPill(r[COL.winterVerdict])}</td>
        <td class="${numClass(wp)}">${fmtMoney(wp)}</td>`;
    }
  ) : '<div class="note">Aucune donnée financière.</div>';

  /* ── 05 Détails par propriété ── */
  const detailHtml = sortedData.map(r => {
    const fields = [
      ["Contact", r[COL.contact]],
      ["Disponible", r[COL.avail]],
      ["Meublée?", r[COL.furnished]],
      ["Bail flexible?", r[COL.flexLease]],
      ["Proprio ouvert?", r[COL.ownerOpen]],
      ["Statut", r[COL.status]],
      ["Date trouvé", r[COL.dateFound]],
    ].filter(([,v]) => v);

    const linkHtml = (r[COL.link] && r[COL.link] !== 'À ajouter')
      ? `<div class="row" style="grid-template-columns:160px 1fr"><b>Annonce</b><span><a href="${esc(r[COL.link])}" target="_blank" rel="noopener">${esc(r[COL.link])}</a></span></div>` : '';

    return `<h3 style="font-size:13px;font-weight:700;color:var(--accent);margin:14px 0 8px">${esc(r[COL.owner] || '—')} · ${esc(r[COL.address] || '—')} ${statusPill(r[COL.status])}</h3>
    <div class="kv">
      ${fields.map(([k,v]) => `<div class="row" style="grid-template-columns:160px 1fr"><b>${k}</b><span>${/oui|non|yes|no|refus|contact|confirm|discu/i.test(v)?statusPill(v):esc(v)}</span></div>`).join('')}
      ${linkHtml}
    </div>`;
  }).join('') || '<div class="note">Aucune propriété.</div>';

  document.getElementById("grid").innerHTML = `
    <section class="wide"><h2><span class="n">01</span>Toutes les propriétés <span class="pill p-blue">${sortedData.length} propriété${sortedData.length!==1?'s':''}</span></h2>${propHtml}</section>
    <section><h2><span class="n">02</span>Prochaines actions</h2>${actionsHtml}</section>
    <section><h2><span class="n">03</span>Notes & contexte</h2>${notesHtml}</section>
    <section class="wide"><h2><span class="n">04</span>Analyse financière</h2>${finHtml}</section>
    <section class="wide"><h2><span class="n">05</span>Détails par propriété</h2>${detailHtml}</section>`;
}

/* ── polling loop ── */
async function poll(manual) {
  try {
    const table = await fetchSheet();
    const rows = toRows(table);
    const snap = JSON.stringify(rows);
    const changed = snap !== lastSnapshot;
    if (changed) { render(rows); lastSnapshot = snap; }
    document.getElementById("dot").classList.remove("err");
    document.getElementById("livetxt").textContent = "en direct · sync " + new Date().toLocaleTimeString('fr-CA');
    document.getElementById("stamp").textContent = changed && !manual && lastSnapshot ? "Mis à jour depuis Sheets à l'instant" : "";
    document.getElementById("err").style.display = "none";
  } catch(e) {
    document.getElementById("dot").classList.add("err");
    document.getElementById("livetxt").textContent = "connexion perdue — nouvelle tentative";
    const eb = document.getElementById("err");
    eb.style.display = "block";
    eb.textContent = "Impossible d'atteindre Google Sheets (" + e.message + "). Vérifiez que le partage est 'Tout le monde avec le lien'.";
  }
}

document.getElementById("ivl").textContent = POLL_MS / 1000;
poll(); setInterval(poll, POLL_MS);
</script>
</body>
</html>
