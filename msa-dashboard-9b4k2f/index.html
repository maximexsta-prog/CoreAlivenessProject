<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="robots" content="noindex, nofollow, noarchive">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Mt. Saint-Anne — Dashboard Logis</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0d1117; --panel:#161b22; --panel2:#1c2230; --line:#252c3a;
  --txt:#e6edf3; --dim:#8b97a8; --faint:#5b6677;
  --green:#3fb950; --green-bg:rgba(63,185,80,.12);
  --yellow:#d29922; --yellow-bg:rgba(210,153,34,.12);
  --red:#f85149; --red-bg:rgba(248,81,73,.12);
  --blue:#58a6ff; --blue-bg:rgba(88,166,255,.12);
  --accent:#7ee2b8;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--txt);font:14px/1.5 Inter,system-ui,sans-serif;padding:28px 32px 60px}
a{color:var(--blue);text-decoration:none}
header{display:flex;align-items:baseline;gap:16px;flex-wrap:wrap;margin-bottom:6px}
h1{font-size:26px;font-weight:800;letter-spacing:-.5px}
.sub{color:var(--dim);font-size:13px;margin-bottom:22px}
.live{display:inline-flex;align-items:center;gap:7px;font-size:12px;color:var(--dim);background:var(--panel);border:1px solid var(--line);border-radius:99px;padding:4px 12px}
.dot{width:8px;height:8px;border-radius:50%;background:var(--green);box-shadow:0 0 8px var(--green);animation:pulse 2s infinite}
.dot.err{background:var(--red);box-shadow:0 0 8px var(--red);animation:none}
@keyframes pulse{50%{opacity:.4}}
.toolbar{margin-left:auto;display:flex;gap:10px;align-items:center}
.btn{background:var(--panel);border:1px solid var(--line);color:var(--txt);border-radius:8px;padding:6px 14px;font-size:12.5px;cursor:pointer;font-family:inherit}
.btn:hover{border-color:var(--blue)}
/* hero */
.hero{display:grid;grid-template-columns:repeat(auto-fit,minmax(190px,1fr));gap:14px;margin-bottom:26px}
.card{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:16px 18px}
.card .k{font-size:11px;text-transform:uppercase;letter-spacing:.8px;color:var(--faint);font-weight:600;margin-bottom:8px}
.card .v{font-size:19px;font-weight:700;line-height:1.25}
.card .v.small{font-size:14px;font-weight:600}
.card.red .v{color:var(--red)} .card.green .v{color:var(--green)}
.card.yellow .v{color:var(--yellow)} .card.blue .v{color:var(--blue)}
.bar{height:8px;background:var(--panel2);border-radius:99px;margin-top:10px;overflow:hidden}
.bar i{display:block;height:100%;border-radius:99px;background:linear-gradient(90deg,var(--red),var(--yellow) 60%,var(--green));transition:width .6s}
/* layout */
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(420px,1fr));gap:18px}
section{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:18px 20px;overflow:auto}
section.wide{grid-column:1/-1}
h2{font-size:15px;font-weight:700;margin-bottom:12px;display:flex;align-items:center;gap:8px}
h2 .n{color:var(--accent);font-family:'JetBrains Mono',monospace;font-size:12px}
table{width:100%;border-collapse:collapse;font-size:13px}
th{text-align:left;color:var(--faint);font-size:11px;text-transform:uppercase;letter-spacing:.6px;padding:6px 10px 8px;border-bottom:1px solid var(--line);white-space:nowrap}
td{padding:8px 10px;border-bottom:1px solid var(--line);vertical-align:top;color:var(--dim)}
td:first-child{color:var(--txt);font-weight:500}
tr:last-child td{border-bottom:none}
tr.changed td{animation:flash 2.5s}
@keyframes flash{0%{background:var(--blue-bg)}100%{background:transparent}}
.pill{display:inline-block;padding:2px 10px;border-radius:99px;font-size:11.5px;font-weight:700;white-space:nowrap}
.p-green{color:var(--green);background:var(--green-bg)}
.p-yellow{color:var(--yellow);background:var(--yellow-bg)}
.p-red{color:var(--red);background:var(--red-bg)}
.p-blue{color:var(--blue);background:var(--blue-bg)}
.p-grey{color:var(--dim);background:var(--panel2)}
.num{font-family:'JetBrains Mono',monospace;font-size:12.5px;text-align:right;white-space:nowrap}
td.num{color:var(--txt)}
.kv{display:grid;gap:6px}
.kv .row{display:grid;grid-template-columns:220px 1fr;gap:12px;padding:7px 10px;border-radius:8px;background:var(--panel2)}
.kv .row b{color:var(--dim);font-weight:600;font-size:12.5px}
.note{font-size:12px;color:var(--faint);margin-top:4px;line-height:1.5}
.banner{border-radius:12px;padding:14px 18px;font-size:13.5px;font-weight:600;line-height:1.5;margin-bottom:26px;border:1px solid}
.banner.yellow{background:var(--yellow-bg);border-color:rgba(210,153,34,.3);color:var(--yellow)}
.banner.red{background:var(--red-bg);border-color:rgba(248,81,73,.3);color:var(--red)}
.banner.green{background:var(--green-bg);border-color:rgba(63,185,80,.3);color:var(--green)}
.foot{margin-top:26px;color:var(--faint);font-size:12px;display:flex;gap:16px;flex-wrap:wrap}
#err{display:none;background:var(--red-bg);border:1px solid var(--red);color:var(--red);border-radius:10px;padding:10px 16px;margin-bottom:18px;font-size:13px}
</style>
</head>
<body>
<header>
  <h1>Mt. Saint-Anne — Dashboard Logis</h1>
  <span class="live"><span class="dot" id="dot"></span><span id="livetxt">connexion…</span></span>
  <div class="toolbar">
    <button class="btn" onclick="poll(true)">↻ Actualiser</button>
    <a class="btn" href="https://docs.google.com/spreadsheets/d/1-u1J6LrIUyj7wBG8mHKZt8jIq-T9V6q0w2ebytm9uFI/edit" target="_blank">✎ Modifier dans Sheets</a>
  </div>
</header>
<div class="sub">Miroir en direct de Google Sheets · actualisation toutes les <span id="ivl">10</span>s · les modifications apparaissent ici automatiquement</div>
<div id="err"></div>
<div class="hero" id="hero"></div>
<div id="banner"></div>
<div class="grid" id="grid"></div>
<div class="foot">
  <span>Source: Google Sheets — onglet « Dashboard Mt. Saint-Anne »</span>
  <span id="stamp"></span>
</div>

<script>
const SHEET_ID  = "1-u1J6LrIUyj7wBG8mHKZt8jIq-T9V6q0w2ebytm9uFI";
const SHEET_NAME = "Dashboard Mt. Saint-Anne";
const POLL_MS   = 10000;

/* ── JSONP fetch ── */
let reqSeq = 0;
function fetchSheet() {
  return new Promise((resolve, reject) => {
    const id  = "gviz_cb_" + (++reqSeq);
    const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?sheet=${encodeURIComponent(SHEET_NAME)}&headers=0&tqx=out:json;responseHandler:${id}&_=${Date.now()}`;
    const s   = document.createElement("script");
    window[id] = resp => { cleanup(); resp.status === "ok" ? resolve(resp.table) : reject(new Error(resp.errors?.[0]?.detailed_message || "sheet error")); };
    function cleanup() { delete window[id]; s.remove(); clearTimeout(t); }
    const t = setTimeout(() => { cleanup(); reject(new Error("timeout")); }, 15000);
    s.onerror = () => { cleanup(); reject(new Error("network / sharing error")); };
    s.src = url; document.head.appendChild(s);
  });
}
const cellV  = c => (c && c.v != null) ? String(c.f ?? c.v).trim() : "";
const toGrid = t => t.rows.map(r => (r.c || []).map(cellV));

/* ── grid helpers ── */
const findRow = (g, txt) => g.findIndex(r => r.some(c => c.toLowerCase() === txt.toLowerCase().trim()));
const findRowContains = (g, txt) => g.findIndex(r => r.some(c => c.toLowerCase().includes(txt.toLowerCase())));
function readBlock(g, start, stopFn) {
  const out = [];
  for (let i = start; i < g.length; i++) {
    if (!g[i].some(c => c)) break;
    if (stopFn && stopFn(g[i])) break;
    out.push(g[i]);
  }
  return out;
}

/* ── parse dashboard tab ── */
function parseMap(grid) {
  const d = {};

  // STATUS row: STATUS | Validation | … | Avancement | 🟥… 29% | Décision | Pas prêt…
  const sr = findRow(grid, "STATUS");
  if (sr >= 0) {
    const row = grid[sr];
    d.statusVal = row[1] || "";
    // find Avancement
    const ai = row.findIndex(c => c.toLowerCase() === "avancement");
    if (ai >= 0) d.avancement = row[ai + 1] || "";
    const di = row.findIndex(c => c.toLowerCase() === "décision");
    if (di >= 0) d.decision = row[di + 1] || "";
  }

  // Maison choisie row
  const mr = findRow(grid, "Maison choisie");
  if (mr >= 0) {
    const row = grid[mr];
    d.maisonChoisie = row[1] || "";
    const dci = row.findIndex(c => c.toLowerCase() === "date cible");
    if (dci >= 0) d.dateCible = row[dci + 1] || "";
    const fi = row.findIndex(c => c.toLowerCase() === "focus actuel");
    if (fi >= 0) d.focusActuel = row[fi + 1] || "";
  }

  // Règle simple
  const rr = findRow(grid, "Règle simple");
  if (rr >= 0) d.regleSimple = grid[rr][1] || "";

  // FOCUS ACTUEL section
  const fc = findRow(grid, "FOCUS ACTUEL");
  if (fc >= 0) {
    d.focus = readBlock(grid, fc + 1, r => /^GATE$/i.test(r[0]));
  }

  // GATE section
  const gc = findRow(grid, "GATE");
  if (gc >= 0) {
    d.gates = readBlock(grid, gc + 1, r => /^GO \/ NO-GO/i.test(r[0]));
  }

  // GO / NO-GO
  const gn = findRow(grid, "GO / NO-GO SIMPLE");
  d.go = ""; d.nogo = "";
  if (gn >= 0) {
    for (let i = gn + 1; i < gn + 6 && i < grid.length; i++) {
      const r = grid[i];
      if (/^GO si/i.test(r[0]))   d.go   = r[1] || "";
      if (/^NO-GO si/i.test(r[0])) d.nogo = r[1] || "";
    }
  }

  // MINI CHIFFRES
  const mc = findRowContains(grid, "MINI CHIFFRES");
  if (mc >= 0) {
    d.mini = readBlock(grid, mc + 1, r => /^PROCHAINES/i.test(r[0]));
  }

  // PROCHAINES ACTIONS 48H
  const pa = findRowContains(grid, "PROCHAINES ACTIONS");
  if (pa >= 0) {
    d.actionsTitle = grid[pa][1] || ""; // summary in col B
    d.actions = [];
    for (let i = pa + 1; i < grid.length; i++) {
      const r = grid[i];
      if (!r[0] && !r[1]) break;
      if (/^Ai-je|^Decision|^RÈGLE/i.test(r[0])) break;
      if (r[1]) d.actions.push(r[1]);
    }
  }

  // Decision checklist (Ai-je…)
  const dc = findRowContains(grid, "Ai-je une vraie maison");
  if (dc >= 0) {
    d.checks = [];
    for (let i = dc; i < grid.length; i++) {
      const r = grid[i];
      if (/^Decision status/i.test(r[0]) || /^RÈGLE/i.test(r[0])) break;
      if (!r[0] && !r[1]) continue;
      if (r[0] && r[1]) d.checks.push([r[0], r[1], r[2] || "", r[3] || ""]);
    }
  }

  // Decision status rows
  d.decisionStatus = grid.filter(r => /^Decision status$/i.test(r[0]));

  // RÈGLE FONDATRICE
  const rf = findRowContains(grid, "RÈGLE FONDATRICE");
  if (rf >= 0) d.regleFond = grid[rf][1] || "";

  return d;
}

/* ── pill helper ── */
const esc = s => String(s || "").replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));

const pill = s => {
  if (!s) return "";
  const l = s.toLowerCase().normalize('NFD').replace(/\p{Diacritic}/gu, '');
  let cls = "p-grey";
  if (/green|oui|yes|done|confirm|go\b/.test(l) && !/no-go/.test(l)) cls = "p-green";
  else if (/yellow|waiting|en cours|progress|tbd|scouting/.test(l)) cls = "p-yellow";
  else if (/red|non|no\b|not |block|pas comm|refus|no-go/.test(l)) cls = "p-red";
  else if (/blue|validation/.test(l)) cls = "p-blue";
  return `<span class="pill ${cls}">${esc(s)}</span>`;
};

/* ── render ── */
let lastSnapshot = "";
function render(grid) {
  const d = parseMap(grid);

  // pct from avancement string e.g. "🟥🟥⬜⬜⬜⬜⬜ 29%"
  const pct = parseInt((d.avancement || "").match(/(\d+)\s*%/) ?.[1] || "0", 10);

  // Hero cards
  document.getElementById("hero").innerHTML = [
    ["STATUS",            esc(d.statusVal || "—"),   "blue",   false],
    ["Avancement",        `${pct}%<div class="bar"><i style="width:${pct}%"></i></div>`, pct < 40 ? "red" : pct < 70 ? "yellow" : "green", false],
    ["Décision",          esc(d.decision || "—"),     "yellow", true],
    ["Maison choisie",    esc(d.maisonChoisie || "—"),"",       true],
    ["Date cible",        esc(d.dateCible || "—"),    "",       true],
    ["Focus actuel",      esc(d.focusActuel || "—"),  "green",  true],
  ].map(([k, v, cls, small]) =>
    `<div class="card ${cls}"><div class="k">${k}</div><div class="v ${small ? 'small' : ''}">${v}</div></div>`
  ).join("");

  // Règle simple banner
  document.getElementById("banner").innerHTML = d.regleSimple
    ? `<div class="banner yellow">⚠ Règle simple — ${esc(d.regleSimple)}</div>` : "";

  // Section builder
  const tbl = (headers, rows, fn) =>
    `<table><tr>${headers.map(h => `<th>${h}</th>`).join("")}</tr>${rows.map(r => `<tr>${fn(r)}</tr>`).join("")}</table>`;

  // 01 GATE
  const gateHtml = (d.gates || []).length ? tbl(
    ["Gate", "Statut", "Preuve / notes", "Prochaine action"],
    d.gates,
    r => `<td>${esc(r[0])}</td><td>${pill(r[1])}</td><td style="max-width:260px;white-space:normal">${esc(r[3])}</td><td style="max-width:200px;white-space:normal">${esc(r[4])}</td>`
  ) : '<div class="note">Aucune gate définie.</div>';

  // 02 FOCUS ACTUEL
  const focusHtml = (d.focus || []).length ? tbl(
    ["Action", "Pourquoi ça compte", "Prochaine action"],
    d.focus,
    r => `<td style="white-space:normal">${esc(r[0])}</td><td style="white-space:normal">${esc(r[1])}</td><td style="white-space:normal">${esc(r[2])}</td>`
  ) : '<div class="note">Aucun focus défini.</div>';

  // 03 GO / NO-GO
  const gonogoHtml = `<div class="kv">
    <div class="row"><b>GO si</b><span style="color:var(--green)">${esc(d.go || "—")}</span></div>
    <div class="row"><b>NO-GO si</b><span style="color:var(--red)">${esc(d.nogo || "—")}</span></div>
  </div>`;

  // 04 MINI CHIFFRES
  const miniHtml = (d.mini || []).length ? `<div class="kv">${d.mini.map(r =>
    `<div class="row"><b>${esc(r[0])}</b><span>${esc(r[1])}</span></div>`
  ).join("")}</div>` : '<div class="note">Aucune donnée.</div>';

  // 05 PROCHAINES ACTIONS 48H
  const actionsHtml = (d.actions || []).length
    ? `${d.actionsTitle ? `<div style="color:var(--accent);font-weight:600;margin-bottom:10px">${esc(d.actionsTitle)}</div>` : ""}
       <div class="kv">${d.actions.map((a, i) =>
         `<div class="row" style="grid-template-columns:28px 1fr"><b style="color:var(--accent)">${i + 1}</b><span>${esc(a)}</span></div>`
       ).join("")}</div>`
    : '<div class="note">Aucune action définie.</div>';

  // 06 Decision checklist
  const checksHtml = (d.checks || []).length ? tbl(
    ["Question", "Réponse", "Pourquoi", "Action"],
    d.checks,
    r => `<td style="white-space:normal">${esc(r[0])}</td><td>${pill(r[1])}</td><td style="white-space:normal;color:var(--faint)">${esc(r[2])}</td><td style="white-space:normal">${esc(r[3])}</td>`
  ) : "";

  // Decision status pills
  const dsHtml = (d.decisionStatus || []).length
    ? `<div style="display:flex;gap:10px;flex-wrap:wrap;margin-bottom:14px">${d.decisionStatus.map(r =>
        `<div style="background:var(--panel2);border-radius:10px;padding:8px 14px;font-size:13px">
          <span style="color:var(--faint);font-size:11px;display:block;margin-bottom:3px;text-transform:uppercase;letter-spacing:.06em">Decision</span>
          ${pill(r[0])} <span style="color:var(--dim);margin:0 6px">—</span> <span>${esc(r[1])}</span>
          ${r[2] ? `<span style="color:var(--faint);font-size:12px"> · ${esc(r[2])}</span>` : ""}
        </div>`
      ).join("")}</div>` : "";

  // RÈGLE FONDATRICE
  const regleHtml = d.regleFond
    ? `<section class="wide"><h2><span class="n">★</span>Règle fondatrice</h2>
        <div class="banner red" style="margin-bottom:0;font-size:14px">${esc(d.regleFond)}</div>
       </section>` : "";

  document.getElementById("grid").innerHTML = `
    <section class="wide"><h2><span class="n">01</span>Gates — Conditions d'avancement</h2>${gateHtml}</section>
    <section><h2><span class="n">02</span>Focus actuel</h2>${focusHtml}</section>
    <section><h2><span class="n">03</span>Go / No-Go</h2>${gonogoHtml}</section>
    <section><h2><span class="n">04</span>Mini chiffres</h2>${miniHtml}</section>
    <section><h2><span class="n">05</span>Prochaines actions 48h</h2>${actionsHtml}</section>
    <section class="wide"><h2><span class="n">06</span>Checklist décision</h2>${dsHtml}${checksHtml}</section>
    ${regleHtml}`;
}

/* ── polling loop ── */
async function poll(manual) {
  try {
    const table = await fetchSheet();
    const grid  = toGrid(table);
    const snap  = JSON.stringify(grid);
    const changed = snap !== lastSnapshot;
    if (changed) { render(grid); lastSnapshot = snap; }
    document.getElementById("dot").classList.remove("err");
    document.getElementById("livetxt").textContent = "en direct · sync " + new Date().toLocaleTimeString('fr-CA');
    document.getElementById("stamp").textContent = changed && !manual && lastSnapshot ? "Mis à jour depuis Sheets à l'instant" : "";
    document.getElementById("err").style.display = "none";
  } catch(e) {
    document.getElementById("dot").classList.add("err");
    document.getElementById("livetxt").textContent = "connexion perdue — nouvelle tentative";
    const eb = document.getElementById("err");
    eb.style.display = "block";
    eb.textContent = "Impossible d'atteindre Google Sheets (" + e.message + "). Vérifiez que le partage est 'Tout le monde avec le lien'.";
  }
}

document.getElementById("ivl").textContent = POLL_MS / 1000;
poll(); setInterval(poll, POLL_MS);
</script>
</body>
</html>
