<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Core Aliveness — Flyer Retraite DWS</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Archivo:wght@500;600;700;800&display=swap" rel="stylesheet">
<style>
  /* ===== EDIT HERE ===== */
  :root {
    --gold: #e7b13a;          /* badge / button / icons */
    --gold-ink: #11313c;      /* dark text on gold */
    --teal-1: #0c3a49;        /* overlay dark (left) */
    --teal-2: rgba(12,58,73,.15); /* overlay light (right) */
    --white: #ffffff;
  }
  * { margin: 0; box-sizing: border-box; }
  html, body { background: #2a2a2a; }
  /* Poster canvas — A-series portrait ratio. Screenshot/print this element. */
  .poster {
    position: relative; width: 1080px; height: 1527px; overflow: hidden;
    background: var(--teal-1);                 /* fallback if photo missing */
    font-family: "Archivo", sans-serif; color: var(--white);
  }
  /* Background photo: save the clean climbing shot as ca-flyer/bg.jpg */
  .poster .bg { position: absolute; inset: 0; background: url(bg.jpg) no-repeat center / cover; }
  /* Legibility gradient: dark on the left where the text sits */
  .poster .overlay {
    position: absolute; inset: 0;
    background: linear-gradient(105deg, rgba(12,58,73,.70) 0%, rgba(12,58,73,.46) 34%,
                rgba(12,58,73,.20) 56%, rgba(12,58,73,0) 78%);
  }
  .content { position: absolute; inset: 0; padding: 78px 70px; display: flex; flex-direction: column; }

  .badge {
    align-self: flex-start; background: var(--gold); color: var(--gold-ink);
    font-weight: 800; font-size: 38px; letter-spacing: .02em;
    padding: 14px 26px; border-radius: 6px; text-transform: uppercase;
  }
  h1 {
    font-family: "Anton", sans-serif; font-weight: 400; text-transform: uppercase;
    font-size: 138px; line-height: .92; letter-spacing: .005em; margin-top: 34px;
    text-shadow: 0 2px 16px rgba(0,0,0,.55), 0 1px 3px rgba(0,0,0,.4);
  }
  h2 {
    font-family: "Anton", sans-serif; font-weight: 400; text-transform: uppercase;
    font-size: 62px; line-height: 1; margin-top: 16px; letter-spacing: .02em;
  }
  .rule { width: 132px; height: 4px; background: var(--gold); margin: 30px 0 26px; border-radius: 2px; }
  .sub { font-size: 33px; font-weight: 600; line-height: 1.32; max-width: 560px;
         text-shadow: 0 1px 8px rgba(0,0,0,.6), 0 1px 2px rgba(0,0,0,.5); }

  .facts { margin-top: 52px; display: flex; flex-direction: column; gap: 26px; }
  .fact { display: flex; align-items: center; gap: 22px; font-size: 35px; font-weight: 600;
          text-shadow: 0 1px 8px rgba(0,0,0,.6), 0 1px 2px rgba(0,0,0,.5); }
  .fact .ic { flex: 0 0 60px; height: 60px; background: var(--gold); border-radius: 12px;
              display: flex; align-items: center; justify-content: center; }
  .fact .ic svg { width: 34px; height: 34px; fill: none; stroke: var(--gold-ink); stroke-width: 2.2;
                  stroke-linecap: round; stroke-linejoin: round; }

  .cta-row { margin-top: auto; display: flex; align-items: flex-end; gap: 30px; }
  .cta {
    background: var(--gold); color: var(--gold-ink); font-weight: 800; font-size: 37px;
    text-transform: uppercase; padding: 24px 38px; border-radius: 10px; letter-spacing: .01em;
  }
  .qr { width: 150px; height: 150px; background: #fff; border-radius: 10px; padding: 8px; flex-shrink: 0; }
  .qr img { width: 100%; height: 100%; display: block; }

  .footer { display: flex; align-items: center; gap: 16px; margin-top: 34px; font-size: 31px; font-weight: 600; }
  .footer svg { width: 38px; height: 38px; fill: none; stroke: var(--gold); stroke-width: 2; }
</style>
</head>
<body>
<div class="poster">
  <!-- Hero photo (add ca-flyer/bg.jpg) -->
  <div class="bg"></div>
  <div class="overlay"></div>

  <div class="content">
    <div class="badge">Inscriptions ouvertes</div>

    <h1>Grimper<br>au-dessus<br>de l'eau</h1>
    <h2>au Vietnam</h2>

    <div class="rule"></div>
    <div class="sub">Deep water solo • escalade • kayak •<br>aventure sur l'eau • petit groupe</div>

    <div class="facts">
      <div class="fact">
        <span class="ic"><svg viewBox="0 0 24 24"><rect x="3" y="5" width="18" height="16" rx="2"/><path d="M3 9h18M8 3v4M16 3v4"/></svg></span>
        Retraite de 5 jours
      </div>
      <div class="fact">
        <span class="ic"><svg viewBox="0 0 24 24"><circle cx="9" cy="8" r="3.2"/><path d="M3 20c0-3.3 2.7-6 6-6s6 2.7 6 6"/><path d="M16 5.2a3 3 0 0 1 0 5.6M18 20c0-2.2-1-4.2-2.6-5.4"/></svg></span>
        9 places seulement
      </div>
      <div class="fact">
        <span class="ic"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/></svg></span>
        Départ : 19 octobre 2026
      </div>
    </div>

    <div class="cta-row">
      <div class="cta">Réserver ma place →</div>
      <div class="qr">
        <img src="qr.png" alt="QR">
      </div>
    </div>

    <div class="footer">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><path d="M3 12h18M12 3c2.5 2.5 2.5 15 0 18M12 3c-2.5 2.5-2.5 15 0 18"/></svg>
      corealivenessproject.com/retraite-dws
    </div>
  </div>
</div>
</body>
</html>
