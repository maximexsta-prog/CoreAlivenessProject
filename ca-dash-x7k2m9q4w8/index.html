<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex, nofollow">
<title>Core Aliveness — Content Dashboard</title>
<style>
  :root {
    --green: #2d5a3d; --bg: #f4f2ed; --card: #fff; --ink: #1c1c1c;
    --muted: #8a8a8a; --amber: #b07d00; --ok: #1e6b3a; --err: #922b21;
  }
  * { box-sizing: border-box; margin: 0; }
  body { background: var(--bg); font-family: -apple-system, "Segoe UI", Roboto, sans-serif; color: var(--ink);
         min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 24px 12px; }
  h1 { font-size: 15px; font-weight: 600; letter-spacing: .12em; text-transform: uppercase; color: var(--green); margin-bottom: 4px; }
  .counter { font-size: 12px; color: var(--muted); margin-bottom: 16px; }
  .stage { display: flex; align-items: center; gap: 10px; width: 100%; max-width: 520px; }
  .arrow { background: var(--card); border: 1px solid #ddd; border-radius: 50%; width: 42px; height: 42px;
           font-size: 18px; cursor: pointer; flex-shrink: 0; transition: .15s; color: var(--ink); }
  .arrow:hover { background: var(--green); color: #fff; }
  .arrow:disabled { opacity: .25; pointer-events: none; }
  .card { background: var(--card); border-radius: 14px; box-shadow: 0 4px 24px rgba(0,0,0,.08);
          overflow: hidden; flex: 1; min-width: 0; }
  .ig-head { display: flex; align-items: center; gap: 10px; padding: 12px 14px; }
  .avatar { width: 34px; height: 34px; border-radius: 50%; background: linear-gradient(135deg, var(--green), #6fae84);
            color: #fff; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 14px; }
  .handle { font-size: 13px; font-weight: 600; }
  .ig-date { margin-left: auto; font-size: 11px; color: var(--muted); }
  .ig-img { width: 100%; aspect-ratio: 1; background: #e9e6df; display: flex; align-items: center;
            justify-content: center; overflow: hidden; }
  .ig-img img { width: 100%; height: 100%; object-fit: cover; }
  .ig-img .ph { color: #b5b0a4; font-size: 13px; text-align: center; padding: 20px; line-height: 1.6; }
  .ig-actions { padding: 10px 14px 0; font-size: 18px; letter-spacing: 8px; color: #444; }
  .ig-cap { padding: 8px 14px 14px; font-size: 13.5px; line-height: 1.45; white-space: pre-wrap; word-wrap: break-word; }
  .ig-cap b { font-weight: 600; }
  .ig-cap .more { color: var(--muted); cursor: pointer; }
  .panel { border-top: 1px solid #eee; padding: 12px 14px; display: flex; flex-direction: column; gap: 10px; }
  .row { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
  .pill { font-size: 11px; font-weight: 700; padding: 3px 10px; border-radius: 99px; text-transform: uppercase; letter-spacing: .05em; }
  .pill.Draft { background: #e8e8e8; color: #555; } .pill.Ready { background: #fff3cd; color: var(--amber); }
  .pill.Scheduled { background: #d3f2dc; color: var(--ok); } .pill.Error { background: #fadbd8; color: var(--err); }
  .btn { border: 1px solid #ddd; background: #fafafa; border-radius: 8px; padding: 7px 12px; font-size: 12.5px;
         cursor: pointer; transition: .15s; }
  .btn:hover { border-color: var(--green); color: var(--green); }
  .btn.primary { background: var(--green); border-color: var(--green); color: #fff; }
  .btn.primary:hover { opacity: .9; }
  input[type=date], input[type=time] { border: 1px solid #ddd; border-radius: 8px; padding: 6px 8px; font-size: 12.5px;
         font-family: inherit; background: #fafafa; }
  .note { font-size: 11.5px; color: var(--err); }
  .toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: var(--ink); color: #fff;
           padding: 10px 18px; border-radius: 10px; font-size: 13px; opacity: 0; transition: .3s; pointer-events: none; }
  .toast.show { opacity: 1; }
  .loading { color: var(--muted); font-size: 14px; padding: 80px 0; }
  .dots { display: flex; gap: 5px; margin-top: 14px; max-width: 520px; flex-wrap: wrap; justify-content: center; }
  .dot { width: 8px; height: 8px; border-radius: 50%; background: #d4d0c6; cursor: pointer; }
  .dot.on { background: var(--green); }
  .dot.s-Ready { background: #e3b341; } .dot.s-Scheduled { background: #57b87a; } .dot.s-Error { background: #d9534f; }
  .dot.on { outline: 2px solid var(--green); outline-offset: 2px; }
  /* View toggle */
  .tabs { display: flex; gap: 6px; margin-bottom: 14px; }
  .tab { border: 1px solid #ddd; background: var(--card); border-radius: 99px; padding: 6px 16px;
         font-size: 12.5px; cursor: pointer; }
  .tab.on { background: var(--green); border-color: var(--green); color: #fff; }
  /* Profile grid view */
  #gridView { display: none; width: 100%; max-width: 520px; background: var(--card);
              border-radius: 14px; box-shadow: 0 4px 24px rgba(0,0,0,.08); overflow: hidden; }
  .pf-head { display: flex; align-items: center; gap: 18px; padding: 18px; }
  .pf-avatar { width: 64px; height: 64px; border-radius: 50%; flex-shrink: 0;
               background: linear-gradient(135deg, var(--green), #6fae84); color: #fff;
               display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 22px; }
  .pf-stats { display: flex; gap: 22px; font-size: 12.5px; text-align: center; }
  .pf-stats b { display: block; font-size: 15px; }
  .pf-bio { padding: 0 18px 14px; font-size: 12.5px; line-height: 1.5; }
  .pf-bio b { font-size: 13px; }
  .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 2px; }
  .tile { aspect-ratio: 1; position: relative; cursor: pointer; overflow: hidden; background: #e9e6df; }
  .tile img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .tile .txt { width: 100%; height: 100%; padding: 10px; background: var(--green); color: #f0ead8;
               font-size: 10.5px; line-height: 1.45; display: flex; align-items: center; overflow: hidden;
               font-family: Georgia, serif; }
  .tile .txt span { display: -webkit-box; -webkit-line-clamp: 7; -webkit-box-orient: vertical; overflow: hidden; }
  .tile:nth-child(even) .txt { background: #f4efe4; color: #3a3a32; }
  .tile .st { position: absolute; top: 6px; right: 6px; width: 10px; height: 10px; border-radius: 50%;
              border: 1.5px solid #fff; box-shadow: 0 0 4px rgba(0,0,0,.35); }
  .st.Draft { background: #aaa; } .st.Ready { background: #e3b341; }
  .st.Scheduled { background: #57b87a; } .st.Error { background: #d9534f; }
  .tile .dt { position: absolute; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,.45); color: #fff;
              font-size: 9.5px; padding: 3px 6px; text-align: center; }
</style>
</head>
<body>
<h1>Core Aliveness</h1>
<div class="counter" id="counter">chargement…</div>
<div class="tabs">
  <button class="tab on" id="tabFeed" onclick="setView('feed')">Posts</button>
  <button class="tab" id="tabGrid" onclick="setView('grid')">Grille</button>
</div>
<div id="gridView"></div>
<div class="stage" id="feedView">
  <button class="arrow" id="prev" aria-label="précédent">‹</button>
  <div class="card" id="card"><div class="loading">Chargement du calendrier…</div></div>
  <button class="arrow" id="next" aria-label="suivant">›</button>
</div>
<div class="dots" id="dots"></div>
<div class="toast" id="toast"></div>

<script>
// ---- Config ----
// The secret key is NEVER stored in this file (the repo is public).
// It comes from the URL fragment (#...) and is remembered in localStorage:
//   https://<host>/dashboard/#YOUR_API_KEY     (first visit)
//   https://<host>/dashboard/                  (after that)
const API = "https://script.google.com/macros/s/AKfycbzWJ2gdoqeapa2vD6cKg-ChM626XisaKzvQnR-OIFvdnoapKEbr9F68CkIPfNQuS1jT/exec";
const KEY = (() => {
  const h = location.hash.slice(1);
  if (h) { localStorage.setItem("ca_key", h); history.replaceState(null, "", location.pathname); }
  return localStorage.getItem("ca_key") || prompt("Clé d'accès :") || "";
})();
const HANDLE = "corealiveness";

let posts = [], idx = 0;

const $ = id => document.getElementById(id);
const toast = m => { const t = $("toast"); t.textContent = m; t.classList.add("show");
                     setTimeout(() => t.classList.remove("show"), 2500); };

// Convert any Drive link to an embeddable thumbnail URL
function imgUrl(u) {
  if (!u) return "";
  const m = u.match(/drive\.google\.com\/(?:file\/d\/|open\?id=|uc\?[^ ]*id=|thumbnail\?[^ ]*id=)([\w-]+)/);
  return m ? `https://drive.google.com/thumbnail?id=${m[1]}&sz=w1080` : u;
}
const fmtDate = d => d ? new Date(d).toLocaleDateString("fr-CA") : "";   // yyyy-mm-dd
const fmtTime = t => { if (!t) return ""; const d = new Date(t);
  return isNaN(d) ? String(t).slice(0,5) : d.toTimeString().slice(0,5); };

async function load() {
  const r = await fetch(`${API}?key=${KEY}&action=rows`);
  const data = await r.json();
  if (data.error) { $("card").innerHTML = `<div class="loading">Erreur : ${data.error}</div>`; return; }
  posts = data.filter(p => (p.Caption || "").trim());
  idx = Math.min(idx, posts.length - 1);
  render();
}

function render() {
  const p = posts[idx];
  if (!p) { $("card").innerHTML = `<div class="loading">Aucun post.</div>`; return; }
  $("counter").textContent = `Post ${idx + 1} / ${posts.length} — ligne ${p.rowNumber}`;
  $("prev").disabled = idx === 0; $("next").disabled = idx === posts.length - 1;

  const img = imgUrl((p["Asset ID"] && p._assetUrl) || p["Media URL"]);
  const cap = p.Caption || "";
  const short = cap.length > 220;
  const capHtml = short && !p._expanded
    ? esc(cap.slice(0, 220)) + `… <span class="more" onclick="expand()">plus</span>`
    : esc(cap);
  const status = p.Status || "Draft";

  $("card").innerHTML = `
    <div class="ig-head"><div class="avatar">CA</div><div class="handle">${HANDLE}</div>
      <div class="ig-date">${fmtDate(p.Date)} · ${fmtTime(p.Time)} · ${esc(p.Platform || "")}</div></div>
    <div class="ig-img">${img
      ? `<img src="${esc(img)}" onerror="this.outerHTML='<div class=ph>Image non chargée<br>Vérifie le partage Drive<br>(Tout utilisateur avec le lien)</div>'">`
      : `<div class="ph">Pas de média<br><small>Ajoute un Media URL ou Asset ID dans la feuille</small></div>`}</div>
    <div class="ig-actions">♡&nbsp;💬&nbsp;✈&nbsp;</div>
    <div class="ig-cap"><b>${HANDLE}</b> ${capHtml}</div>
    <div class="panel">
      <div class="row">
        <span class="pill ${esc(status)}">${esc(status)}</span>
        ${["Draft","Ready","Scheduled"].filter(s => s !== status).map(s =>
          `<button class="btn" onclick="setStatus('${s}')">→ ${s}</button>`).join("")}
      </div>
      <div class="row">
        <input type="date" id="d" value="${fmtDate(p.Date)}">
        <input type="time" id="t" value="${fmtTime(p.Time)}">
        <button class="btn primary" onclick="setDate()">Mettre à jour la date</button>
      </div>
      ${p.Notes ? `<div class="note">${esc(p.Notes)}</div>` : ""}
      ${p["Buffer Post ID"] ? `<div class="counter">Buffer ID : ${esc(p["Buffer Post ID"])}</div>` : ""}
    </div>`;
  renderDots();
}

function renderDots() {
  $("dots").innerHTML = posts.map((p, i) =>
    `<div class="dot s-${esc(p.Status || "Draft")} ${i === idx ? "on" : ""}" onclick="go(${i})"></div>`).join("");
}

function esc(s) { return String(s).replace(/[&<>"']/g, c =>
  ({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;" }[c])); }

function go(i) { idx = i; posts[idx]._expanded = false; render(); }
function expand() { posts[idx]._expanded = true; render(); }
$("prev").onclick = () => go(idx - 1);
$("next").onclick = () => go(idx + 1);
document.addEventListener("keydown", e => {
  if (e.key === "ArrowLeft" && idx > 0) go(idx - 1);
  if (e.key === "ArrowRight" && idx < posts.length - 1) go(idx + 1);
});
// Touch swipe
let x0 = null;
document.addEventListener("touchstart", e => x0 = e.touches[0].clientX);
document.addEventListener("touchend", e => {
  if (x0 === null) return; const dx = e.changedTouches[0].clientX - x0; x0 = null;
  if (dx > 60 && idx > 0) go(idx - 1);
  if (dx < -60 && idx < posts.length - 1) go(idx + 1);
});

async function api(params) {
  const r = await fetch(`${API}?key=${KEY}&${params}`);
  const d = await r.json();
  if (d.error) throw new Error(d.error);
  return d;
}
async function setStatus(s) {
  const p = posts[idx], old = p.Status;
  if (s === "Scheduled") {
    // Manual override only - actual Buffer scheduling happens via the Ready flow
    if (!confirm("Marquer comme Scheduled SANS envoyer à Buffer ?\n(Pour envoyer à Buffer : mets en Ready puis lance le scheduler.)")) return;
  }
  p.Status = s; render();
  try { await api(`action=setStatus&row=${p.rowNumber}&status=${s}`); toast(`Ligne ${p.rowNumber} → ${s}`); }
  catch (e) { p.Status = old; render(); toast("Erreur : " + e.message); }
}
async function setDate() {
  const p = posts[idx], d = $("d").value, t = $("t").value;
  if (!d) return toast("Choisis une date");
  try { await api(`action=setDate&row=${p.rowNumber}&date=${d}&time=${t}`);
        p.Date = d + "T12:00:00"; p.Time = t; render(); toast(`Date mise à jour — ligne ${p.rowNumber}`); }
  catch (e) { toast("Erreur : " + e.message); }
}

// Resolve Asset IDs to Drive URLs via the Media Library (one extra call, cached)
async function resolveAssets() {
  if (!posts.some(p => (p["Asset ID"] || "").trim())) return;
  try {
    const lib = await api("action=library");
    posts.forEach(p => { const a = (p["Asset ID"] || "").trim(); if (a && lib[a]) p._assetUrl = lib[a]; });
    render();
  } catch (e) { /* library endpoint optional */ }
}

// ---- Profile grid view (Instagram-profile-style global look) ----
let view = "feed";
function setView(v) {
  view = v;
  $("feedView").style.display = v === "feed" ? "flex" : "none";
  $("dots").style.display = v === "feed" ? "flex" : "none";
  $("gridView").style.display = v === "grid" ? "block" : "none";
  $("tabFeed").classList.toggle("on", v === "feed");
  $("tabGrid").classList.toggle("on", v === "grid");
  if (v === "grid") renderGrid();
}
function renderGrid() {
  // Newest first, like a real Instagram profile
  const order = posts.map((p, i) => i)
    .sort((a, b) => new Date(posts[b].Date) - new Date(posts[a].Date));
  $("counter").textContent = `${posts.length} publications — vue globale`;
  $("gridView").innerHTML = `
    <div class="pf-head"><div class="pf-avatar">CA</div>
      <div class="pf-stats">
        <div><b>${posts.length}</b>publications</div>
        <div><b>${posts.filter(p => p.Status === "Scheduled").length}</b>planifiés</div>
        <div><b>${posts.filter(p => p.Status === "Ready").length}</b>prêts</div>
      </div></div>
    <div class="pf-bio"><b>The Core Aliveness Project</b><br>
      Se sentir vivant. Explorer son edge.<br>Nature · Escalade · Connexion</div>
    <div class="grid">${order.map(i => {
      const p = posts[i];
      const img = imgUrl((p["Asset ID"] && p._assetUrl) || p["Media URL"]);
      return `<div class="tile" onclick="openPost(${i})">
        ${img ? `<img src="${esc(img)}" loading="lazy"
                  onerror="this.outerHTML='<div class=txt><span>${esc(p.Caption.slice(0,160))}</span></div>'">`
              : `<div class="txt"><span>${esc(p.Caption.slice(0, 160))}</span></div>`}
        <div class="st ${esc(p.Status || "Draft")}"></div>
        <div class="dt">${fmtDate(p.Date)}</div>
      </div>`;
    }).join("")}</div>`;
}
function openPost(i) { setView("feed"); go(i); }

load().then(resolveAssets);
</script>
</body>
</html>
