<!--
  This is ONE file with 3 parts, like every website:
  1. <style> below = the LOOK (colors, sizes, spacing). Doesn't do anything, just decoration.
  2. <body> further down = the CONTENT (boxes, titles, buttons - the actual page structure).
  3. <script> near the bottom = the BEHAVIOR (the "brain" - reads tide numbers, decides
     colors/labels, and rewrites pieces of the page when you click something).
  Nothing on screen is "permanent" - almost all of <body>'s inner content is generated
  by JavaScript functions (see render()/renderCal()/renderTabs() near the bottom) and
  rewritten every time you change day/month/language.
-->
<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Marées – Ha Long Bay</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<script>(function(){try{var t=localStorage.getItem('tide_theme');if(t==='dark')document.documentElement.classList.add('dark');else if(t==='light')document.documentElement.classList.add('light');}catch(e){}})();</script>
<style>
/* * = "every element". This resets the browser's built-in spacing/sizing quirks
   so we start from a clean, predictable slate instead of fighting default margins. */
*{box-sizing:border-box;margin:0;padding:0;font-family:'Inter',-apple-system,Segoe UI,Roboto,Arial,sans-serif}
/* Dashboard palette. Light by default; dark auto-follows the device, or is forced
   by the .dark/.light class on <html> from the theme toggle in the header. */
:root{
  --bg:#f6f7f9; --card:#ffffff; --line:#e6e8ee; --line2:#eef0f4; --txt:#0f141c; --muted:#5e6675; --faint:#9aa2b1;
  --blue:#2f6bf6; --blue-soft:#eef3ff; --tile:#f1f3f7; --green:#13a04a;
  --chart:#ffffff; --grid:rgba(15,20,28,.07); --win:rgba(47,107,246,.06); --watermark:rgba(47,107,246,.07);
}
@media(prefers-color-scheme:dark){:root:not(.light){
  --bg:#050505; --card:#0d0d0d; --line:#1f1f1f; --line2:#161616; --txt:#fafafa; --muted:#9a9a9a; --faint:#5e5e5e;
  --blue:#5b8cff; --blue-soft:#101a2c; --tile:#161616; --green:#3ecf8e;
  --chart:#0c0c0c; --grid:rgba(255,255,255,.06); --win:rgba(91,140,255,.08); --watermark:rgba(91,140,255,.06);
}}
:root.dark{
  --bg:#050505; --card:#0d0d0d; --line:#1f1f1f; --line2:#161616; --txt:#fafafa; --muted:#9a9a9a; --faint:#5e5e5e;
  --blue:#5b8cff; --blue-soft:#101a2c; --tile:#161616; --green:#3ecf8e;
  --chart:#0c0c0c; --grid:rgba(255,255,255,.06); --win:rgba(91,140,255,.08); --watermark:rgba(91,140,255,.06);
}
body{background:var(--bg);color:var(--txt);min-height:100vh;font-size:14px;-webkit-font-smoothing:antialiased}

header{background:var(--card);padding:13px 18px;display:flex;align-items:center;justify-content:space-between;gap:12px;border-bottom:1px solid var(--line);position:sticky;top:0;z-index:10}
.brand{display:flex;align-items:center;gap:11px;min-width:0}
.brand .logo{width:34px;height:34px;flex:0 0 34px;border-radius:8px;background:var(--blue);display:grid;place-items:center}
header h1{font-size:16px;font-weight:700;letter-spacing:-.2px;color:var(--txt)}
header .sub{font-size:11px;color:var(--muted);margin-top:2px}
.hdr-actions{display:flex;align-items:center;gap:9px;flex:0 0 auto}
.badge{font-size:10px;color:var(--faint);text-align:right;line-height:1.4;max-width:90px}
#lang-tog{font-size:12px;color:var(--muted);cursor:pointer;padding:7px 10px;border:1px solid var(--line);border-radius:8px;font-weight:600;user-select:none;transition:.15s}
#lang-tog:hover{background:var(--tile);color:var(--txt)}
#theme-tog{display:grid;place-items:center;width:34px;height:34px;flex:0 0 34px;border:1px solid var(--line);background:var(--card);color:var(--muted);border-radius:8px;cursor:pointer;transition:.15s}
#theme-tog:hover{background:var(--tile);color:var(--txt)}
#theme-tog svg{width:17px;height:17px}

/* Month tabs */
.tabs{display:flex;flex-wrap:wrap;gap:8px;padding:16px 18px 0}
.tab-break{display:none}
.tab{background:var(--tile);border:1px solid transparent;color:var(--muted);padding:7px 14px;border-radius:20px;cursor:pointer;font-size:13px;font-weight:600;transition:.15s}
.tab:hover{background:var(--blue-soft);color:var(--blue)}
.tab.active{background:var(--blue);border-color:var(--blue);color:#fff}

/* DWS status banner (status colours are set inline by JS — they read well on both themes) */
.dws-wrap{padding:10px 18px 12px}
.dws-badge{display:flex;align-items:center;gap:10px;padding:11px 14px;border-radius:11px;border:1px solid transparent}
.dws-code{font-size:18px;font-weight:800;letter-spacing:-.5px;min-width:36px}
.dws-info{flex:1}
.dws-label{font-size:12px;font-weight:700;line-height:1.4}
.dws-window{font-size:10px;opacity:.8;margin-top:1px}

/* Event cards */
.events{display:flex;gap:10px;padding:0 18px 14px;flex-wrap:wrap}
.ecard{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:11px 14px;flex:1;min-width:110px;border-left:3px solid var(--blue)}
.ecard.low{border-left-color:var(--green)}
.etype{font-size:10px;text-transform:uppercase;color:var(--faint);margin-bottom:4px;letter-spacing:.5px;font-weight:600}
.etime{font-size:17px;font-weight:800;letter-spacing:-.3px;color:var(--txt)}
.eheight{font-size:12px;color:var(--muted);margin-top:2px}

/* Chart */
.chart{margin:0 18px;background:var(--chart);border:1px solid var(--line);border-radius:12px;overflow:hidden}
.chart-head{background:var(--blue);color:#fff;padding:8px 12px;font-size:12px;font-weight:700;letter-spacing:.2px;text-align:center}
.chart-legend{padding:6px 12px;display:flex;align-items:center;gap:14px;font-size:10px;color:var(--muted);border-bottom:1px solid var(--line2);flex-wrap:wrap}
.legend-item{display:flex;align-items:center;gap:4px}
.legend-dot{width:8px;height:8px;border-radius:50%}
.tog24{margin-left:auto;background:var(--tile);border:1px solid var(--line);color:var(--muted);font-size:10px;font-weight:600;padding:3px 9px;border-radius:6px;cursor:pointer}
/* Vertical bar chart */
.vchart{position:relative;display:flex;align-items:flex-end;height:558px;padding:6px 8px 22px 28px;gap:1px}
.chart-datebg{position:absolute;top:12px;left:0;right:0;text-align:center;pointer-events:none;z-index:0;user-select:none;line-height:1}
.cdb-day{display:block;font-size:96px;font-weight:900;letter-spacing:-4px;color:var(--watermark)}
.cdb-mon{display:block;font-size:28px;font-weight:700;letter-spacing:4px;color:var(--watermark);margin-top:-8px}
.vcol.vhalf .vhr{font-size:5px;color:var(--faint);opacity:.6}
.vgrid{position:absolute;left:0;right:0;height:1px;background:var(--grid);z-index:1;pointer-events:none}
.vglabel{position:absolute;left:2px;top:-7px;font-size:7px;color:var(--faint);line-height:1}
.vcol{flex:1;min-width:0;position:relative;cursor:default}
.vcol.vwin{background:var(--win);border-radius:2px}
.vcol::after{content:attr(data-h)'m';position:absolute;top:0;left:50%;transform:translateX(-50%);background:#111827;color:#e0f0ff;font-size:9px;font-weight:700;padding:2px 6px;border-radius:4px;white-space:nowrap;z-index:10;pointer-events:none;opacity:0;transition:opacity .1s}
.vcol:hover::after{opacity:1}
.vbar{width:100%;height:100%;min-height:1px;border-radius:2px 2px 0 0;transition:height .3s}
.vhr{position:absolute;top:100%;left:0;right:0;font-size:7px;color:var(--faint);text-align:center;padding-top:3px;line-height:1}
.vcol.vwin .vhr{color:var(--blue)}
.vthresh{position:absolute;left:8px;right:8px;height:1px;background:#f5a623;opacity:.85;z-index:2;pointer-events:none}
.vthresh2{position:absolute;left:8px;right:8px;height:1px;background:#f5e88a;opacity:.85;z-index:2;pointer-events:none}

/* Calendar */
.cal-wrap{padding:18px}
.cal-title{font-size:12px;color:var(--faint);margin-bottom:10px;text-transform:uppercase;letter-spacing:.5px;font-weight:600}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px}
.cal-hdr{font-size:10px;color:var(--faint);text-align:center;padding:4px 2px;font-weight:700}
.cal-day{background:var(--card);border:1px solid var(--line);border-radius:8px;padding:6px 3px;text-align:center;cursor:pointer;transition:.1s}
.cal-day:hover{border-color:var(--blue)}
.cal-day.active{border-color:var(--blue);background:var(--blue-soft)}
.cal-day.empty{background:transparent;border-color:transparent;cursor:default}
.cdn{font-size:12px;font-weight:700;color:var(--txt)}
.cdws{font-size:9px;font-weight:800;line-height:1.4;margin-top:1px}
.cdmax{font-size:9px;color:var(--muted);line-height:1.3}

.station-note{padding:6px 18px 16px;font-size:11px;color:var(--faint)}

@media(max-width:768px){ .tab-break{display:block;width:100%;height:0} }
@media(max-width:400px){
  .events{gap:6px}
  .ecard{padding:8px 10px}
  .etime{font-size:15px}
  .badge{display:none}
}
</style>
</head>

<!-- Top bar: title + the Fr/En language switch button (calls toggleLang() in the script). -->
<header>
  <div class="brand">

    <div>
      <h1>Hòn Dấu — Hạ Long</h1>

  <div class="hdr-actions">
    <span id="lang-tog" onclick="toggleLang()">Fr</span>
    <button id="theme-tog" onclick="toggleTheme()" aria-label="Toggle theme"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/><path d="M12 3a9 9 0 0 1 0 18Z" fill="currentColor" stroke="none"/></svg></button>
    <span class="badge" id="hdr-badge">Usage interne DWS</span>
  </div>
</header>

<!-- Empty on purpose: renderTabs() fills this with one button per month (Jan, Feb, ...). -->
<div class="tabs" id="tabs"></div>


<!-- Empty on purpose: render() fills this with the colored DWS status badge (FD/AM/PM/NA...) for the selected day. -->
<div class="dws-wrap" id="dws-wrap"></div>

<!-- Empty on purpose: render() fills this with the "High tide" / "Low tide" time cards for the selected day. -->
<div class="events" id="events"></div>

<!-- The tide bar chart for the selected day. Only the legend text/buttons are fixed;
     the actual bars (#chart-rows) are rebuilt by render() every time the day changes. -->
<div class="chart" id="chart">
  <div class="chart-head" id="chart-head">Hòn Dấu — Trạm tham chiếu (20°40'N 106°49'E)</div>
  <div class="chart-legend">
    <span class="legend-item"><span class="legend-dot" style="background:#1976D2"></span>≥ 1.4m (DWS ok)</span>
    <span class="legend-item"><span class="legend-dot" style="background:#c04040"></span>&lt; 1.4m</span>
    <span class="legend-item" id="legend-thresh" style="color:#f5a623">— seuil 1.4m</span>
    <span class="legend-item" style="color:#f5e88a">— 1.5m</span>
    <!-- Toggle button: flips the showFull24 flag and redraws the chart either
         zoomed in (6h-19h) or showing the full 24h day. -->
    <button id="tog24" class="tog24" onclick="showFull24=!showFull24;render()">24h</button>
  </div>
  <div id="chart-rows"></div>
</div>

<div class="station-note" id="station-note-el">Données officielles horaires · Hòn Dấu = station de référence nord Vietnam · Max oct/nov: 4.1 m</div>

<!-- Empty on purpose: renderCal() fills this with one clickable box per day of the selected month. -->
<div class="cal-wrap">
  <div class="cal-title" id="cal-title-el">Vue mensuelle — cliquer un jour</div>
  <div class="cal-grid" id="calgrid"></div>
</div>

// One entry per month, used to build the month tabs and the calendar grid.
//   label/short = text shown on screen (full / abbreviated)
//   key         = matches the keys used in H above, so we can look up that month's data
//   days        = how many days that month has (28 for Feb 2026, 30 or 31 otherwise)
//   start       = which weekday the 1st of the month falls on (0=Sunday...6=Saturday),
//                 used by renderCal() to add empty blank boxes before day 1 so the
//                 calendar lines up under the correct weekday column
const MONTHS = [
  {label:'Janvier 2026',   short:'Jan', key:'2026-01', days:31, start:4},
  {label:'Février 2026',  short:'Feb', key:'2026-02', days:28, start:0},
  {label:'Mars 2026',      short:'Mar', key:'2026-03', days:31, start:0},
  {label:'Avril 2026',     short:'Apr', key:'2026-04', days:30, start:3},
  {label:'Mai 2026',       short:'May', key:'2026-05', days:31, start:5},
  {label:'Juin 2026',      short:'Jun', key:'2026-06', days:30, start:1},
  {label:'Juillet 2026',   short:'Jul', key:'2026-07', days:31, start:3},
  {label:'Août 2026',      short:'Aug', key:'2026-08', days:31, start:6},
  {label:'Septembre 2026', short:'Sep', key:'2026-09', days:30, start:2},
  {label:'Octobre 2026',   short:'Oct', key:'2026-10', days:31, start:4},
  {label:'Novembre 2026',  short:'Nov', key:'2026-11', days:30, start:0},
  {label:'Décembre 2026',  short:'Dec', key:'2026-12', days:31, start:2},
];

// MAX_H = the tallest tide value the chart's vertical scale goes up to (used to convert
//          a height in meters into a height in pixels for the bars).
// DWS_THRESH = the safety minimum (1.4m). Below this, diving is considered unsafe.
const MAX_H = 4.5;
const DWS_THRESH = 1.4;

// These 4 variables are the app's "current state" - what's on screen right now.
// They get changed by the click/tap functions below (selMonth, pick, prevDay, nextDay,
// toggleLang), and every time one of them changes, render()/renderCal() are called
// again to redraw the page to match the new state.
//   mIdx       = index into MONTHS[] of the month currently shown (9 = October, since arrays start at 0)
//   curDay     = the day number currently selected (1-31)
//   showFull24 = false = chart shows only 6h-19h (the interesting window); true = shows all 24h
//   lang       = 'fr' or 'en' - which language's text to display
let mIdx = 9, curDay = 15, showFull24 = false, lang = 'fr';

// All the on-screen text that changes with language, in one place. TR[lang].XXX
// is used everywhere instead of hardcoding French or English directly, so toggleLang()
// can swap every label on the page just by switching which half of this object it reads from.
const TR = {
  fr: {
    sub:         'Marées astronomiques · ICT (UTC+7)',
    badge:       'Usage interne DWS',
    stationNote: 'Données officielles horaires · Hòn Dấu = station de référence nord Vietnam · Max oct/nov: 4.1 m',
    calTitle:    'Vue mensuelle — cliquer un jour',
    calHdr:      ['D','L','M','M','J','V','S'],
    highTide:    '▲ Marée haute',
    lowTide:     '▼ Marée basse',
    legendThresh:'— seuil 1.4m',
    FD_label:   'Journée entière',
    AM_label:   'Matin seulement',
    PM_label:   'Après-midi',
    PM_late:    'Après-midi tardif',
    AM_star:    'Tôt le matin',
    PM_star:    "Fin d'après-midi",
    closed_lab: 'Fermé',
    closed_win: 'Niveau insuffisant',
  },
  en: {
    sub:         'Astronomical tides · ICT (UTC+7)',
    badge:       'Internal DWS use',
    stationNote: 'Official hourly data · Hòn Dấu = north Vietnam reference station · Max Oct/Nov: 4.1 m',
    calTitle:    'Monthly view — click a day',
    calHdr:      ['S','M','T','W','T','F','S'],
    highTide:    '▲ High tide',
    lowTide:     '▼ Low tide',
    legendThresh:'— threshold 1.4m',
    FD_label:   'Full day',
    AM_label:   'Morning only',
    PM_label:   'Afternoon',
    PM_late:    'Late afternoon',
    AM_star:    'Early morning',
    PM_star:    'Late afternoon',
    closed_lab: 'Closed',
    closed_win: 'Insufficient level',
  }
};

// Looks up the 24 hourly numbers for one specific day.
// If that day doesn't exist in H (shouldn't normally happen), falls back to a flat
// "2m all day" array instead of crashing - a safety net, not real data.
function getArr(mi, day){ return H[MONTHS[mi].key][day] || Array(24).fill(2); }

// Takes the 24 hourly readings and "fills in the gaps" to get a reading every 30 minutes
// instead of every 60. It does this with simple averaging: the guessed value at h:30 is
// just the midpoint between the h:00 and (h+1):00 readings (a straight line between two
// known points - this is called "linear interpolation").
// Result: 47 values. Even index (0,2,4...) = the original hour readings (h:00).
//         Odd index (1,3,5...) = the guessed half-hour readings (h:30).
//   So a[h*2] = reading at h:00, a[h*2+1] = reading at h:30.
function interp30(arr) {
  const r = [];
  for (let i = 0; i < arr.length - 1; i++) { r.push(arr[i]); r.push((arr[i]+arr[i+1])/2); }
  r.push(arr[arr.length-1]);
  return r; // 47 values, indices 0–46
}

// THE MAIN RULE ENGINE. For one day's tide readings, decides what kind of diving
// session is possible: Full Day, morning-only, afternoon-only, a "bonus" early/late
// window, or none at all (forbidden / NA).
//
// How it works: it checks several fixed time windows, one after another, and uses the
// FIRST one that's true. "True" means: every single 30-minute reading inside that
// window is at or above the 1.4m safety threshold (T). The order of these checks is
// the priority order - e.g. a Full Day window is checked before anything else, because
// if the whole day is safe we don't need to bother checking smaller windows.
// If NONE of the windows pass, the day falls through to the last line: forbidden (🚫).
//
// a.slice(18,33) etc. = "the chunk of the 30-min array covering that specific window".
// Since index 0 = midnight and each index = 30 minutes, index 18 = 9h00, index 33 = 16h30
// (slice's end is exclusive, so .slice(18,33) actually covers up to but not including 33,
// i.e. up to 16h00's reading at index 32 - meaning the window is 9h00 through 16h00).
function dwsStatus(arr) {
  const T = DWS_THRESH;
  const t = TR[lang];
  const a = interp30(arr); // a[h*2]=h:00, a[h*2+1]=h:30

  // 1) Best case: safe non-stop from 9h to 16h -> Full Day
  if (a.slice(18,33).every(v=>v>=T))
    return {code:'FD',  label:t.FD_label,  window:'9h – 16h',        color:'#27ae60', bg:'rgba(39,174,96,.12)'};
  // 2) Morning window A: safe 9h to 12h -> Morning
  if (a.slice(18,25).every(v=>v>=T))
    return {code:'AM',  label:t.AM_label,  window:'9h – 12h',        color:'#2980b9', bg:'rgba(41,128,185,.12)'};
  // 3) Morning window B (slightly earlier/wider): safe 8h to 11h -> Morning
  if (a.slice(16,23).every(v=>v>=T))
    return {code:'AM',  label:t.AM_label,  window:'8h – 11h',        color:'#2980b9', bg:'rgba(41,128,185,.12)'};
  // 4) Afternoon window A: safe 12h to 16h -> Afternoon
  if (a.slice(24,33).every(v=>v>=T))
    return {code:'PM',  label:t.PM_label,  window:'12h – 16h',       color:'#e67e22', bg:'rgba(230,126,34,.12)'};
  // 5) Afternoon window B (shifted later): safe 13h30 to 17h -> Afternoon
  if (a.slice(27,35).every(v=>v>=T))
    return {code:'PM',  label:t.PM_label,  window:'13h30 – 17h',     color:'#e67e22', bg:'rgba(230,126,34,.12)'};
  // 6) None of the AM/PM/FD windows worked - last chance, an earlier "bonus" morning
  //    window: safe 6h30 to 10h -> Early morning (marked with a star)
  if (a.slice(13,21).every(v=>v>=T))
    return {code:'AM★', label:t.AM_star,   window:'6h30 – 10h',      color:'#3498db', bg:'rgba(52,152,219,.10)'};
  // 7) Same idea but for the end of the day: safe 15h to 17h30 -> Late afternoon (star)
  if (a.slice(30,36).every(v=>v>=T))
    return {code:'PM★', label:t.PM_star,   window:'15h – 17h30',     color:'#f39c12', bg:'rgba(243,156,18,.10)'};
  // 8) Nothing matched at all -> the day is unsafe for diving, no window works
  return {code:'🚫', label:t.closed_lab, window:t.closed_win,       color:'#e74c3c', bg:'rgba(231,76,60,.12)'};
}

// Picks the fill color for one bar in the chart, based on how high the water is at
// that half-hour. Red = below the safety threshold (1.4m). Above that, the bar gets
// progressively darker blue the higher the water is - purely visual, no logic impact.
function barColor(h){
  if(h < DWS_THRESH) return '#c04040';
  if(h>=3.5) return '#0d47a1';
  if(h>=2.5) return '#1565C0';
  if(h>=1.5) return '#1976D2';
  return '#1E88E5';
}

// Redraws everything that depends on "which day is selected": the colored status
// banner, the high/low tide cards, and the bar chart. Called every time the user
// picks a new day, changes month, toggles 24h view, or switches language.
function render(){
  const m = MONTHS[mIdx];
  const key = m.key + '-' + String(curDay).padStart(2,'0');
  const arr = getArr(mIdx, curDay);          // the 24 hourly readings for the selected day
  const dws = dwsStatus(arr);                 // run the rule engine to get FD/AM/PM/NA + color



  // DWS status banner: build a colored box showing the code (FD/AM/PM/...), the
  // plain-language label, and the time window - using whatever dwsStatus() returned.
  document.getElementById('dws-wrap').innerHTML =
    `<div class="dws-badge" style="background:${dws.bg};border-color:${dws.color}55;color:${dws.color}">
      <div class="dws-code">${dws.code}</div>
      <div class="dws-info">
        <div class="dws-label">${dws.label}</div>
        <div class="dws-window">${dws.window}</div>
      </div>
    </div>`;

  // Find daily high / low from hourly data: scan the 24 numbers for the biggest
  // and smallest, then find which hour (index) that value happened at.
  const maxH = Math.max(...arr);
  const minL = Math.min(...arr);
  const maxHr = arr.indexOf(maxH);
  const minHr = arr.indexOf(minL);
  const fmtH = h => `${String(h).padStart(2,'0')}h00`;
  document.getElementById('events').innerHTML =
    `<div class="ecard high"><div class="etype">${TR[lang].highTide}</div><div class="etime">${fmtH(maxHr)}</div><div class="eheight">${maxH.toFixed(2)} m</div></div>` +
    `<div class="ecard low"><div class="etype">${TR[lang].lowTide}</div><div class="etime">${fmtH(minHr)}</div><div class="eheight">${minL.toFixed(2)} m</div></div>`;

  // Vertical bar chart — 30-min interpolated.
  // The chart is drawn entirely with math: every height/position below is converted
  // from "meters" into "pixels" using the same ratio (value / MAX_H * BAREA), so a
  // taller tide always means a taller bar, scaled to fit the fixed-height chart box.
  const BAREA = 474; // px — bar drawing area height
  const threshPx = Math.round(DWS_THRESH / MAX_H * BAREA);  // pixel position of the 1.4m line
  const thresh2Px = Math.round(1.5 / MAX_H * BAREA);        // pixel position of the 1.5m line
  const a30 = interp30(arr); // 47 half-hour values for the whole day
  const idxFrom = showFull24 ? 0  : 12; // start at midnight, or 6:00 if zoomed in
  const idxTo   = showFull24 ? 46 : 38; // end at 23:00, or 19:00 if zoomed in
  // in 24h mode show hour label only every 2h to avoid crowding
  const labelEvery = showFull24 ? 4 : 2;
  let cols = ''; // will hold the HTML for every single bar, glued together
  for(let idx = idxFrom; idx <= idxTo; idx++){
    const lev = a30[idx];                          // water height at this half-hour
    const bh = Math.max(1, lev / MAX_H * BAREA);    // bar height in pixels (min 1px so it's always visible)
    const isHalf = idx % 2 === 1;                   // true if this column is a "h:30" reading
    const h = Math.floor(idx / 2);                  // the hour number this column belongs to
    const inWin = idx >= 18 && idx <= 32;            // highlight band: 9:00–16:00 (the FD window)
    const showLabel = !isHalf && (h % (labelEvery/2) === 0);
    const label = isHalf ? (showFull24 ? '' : '·') : (showLabel ? String(h).padStart(2,'0') : '');
    // One <div> per bar: its pixel height is set inline, its color comes from barColor(),
    // and hovering it shows the exact value via the data-h attribute (see CSS .vcol::after).
    cols += `<div class="vcol${inWin?' vwin':''}${isHalf?' vhalf':''}" style="height:${bh}px" data-h="${lev.toFixed(2)}">` +
      `<div class="vbar" style="background:${barColor(lev)}"></div>` +
      `<div class="vhr">${label}</div></div>`;
  }
  // Update the 24h/6h-19h toggle button's text/color to reflect the current mode
  document.getElementById('tog24').textContent = showFull24 ? '6h–19h' : '24h';
  document.getElementById('tog24').style.color = showFull24 ? 'var(--blue)' : 'var(--muted)';
  // Faint horizontal gridlines every 0.5m, with a small number label on each
  const grids = [0.5,1.0,1.5,2.0,2.5,3.0,3.5,4.0].map(g =>
    `<div class="vgrid" style="bottom:${Math.round(g/MAX_H*BAREA)+22}px"><span class="vglabel">${g.toFixed(1)}</span></div>`
  ).join('');
  // Big faint "15 OCT"-style watermark behind the bars, just for visual flair
  const dateBg = `<div class="chart-datebg"><span class="cdb-day">${curDay}</span><span class="cdb-mon">${MONTHS[mIdx].short.toUpperCase()}</span></div>`;
  // Assemble everything (watermark + gridlines + the 2 threshold lines + all the bars)
  // into one HTML string and drop it into the page in a single shot.
  document.getElementById('chart-rows').innerHTML =
    `<div class="vchart">${dateBg}${grids}<div class="vthresh" style="bottom:${threshPx + 22}px"></div><div class="vthresh2" style="bottom:${thresh2Px + 22}px"></div>${cols}</div>`;

  // Calendar highlight: just toggle which day box has the "active" outline,
  // without rebuilding the whole calendar (cheaper than calling renderCal() again).
  document.querySelectorAll('.cal-day[data-d]').forEach(el => {
    el.classList.toggle('active', +el.dataset.d === curDay);
  });
}

// Rebuilds the whole calendar grid for the current month: one box per day, each
// showing the day number, its DWS code (FD/AM/PM/...), and the day's max tide height.
function renderCal(){
  const m = MONTHS[mIdx];
  const hdr = TR[lang].calHdr;                       // weekday letters (D L M M J V S, or S M T W T F S)
  let h = hdr.map(x => `<div class="cal-hdr">${x}</div>`).join('');
  // Add blank boxes before day 1 so day 1 lines up under the correct weekday column
  for(let i = 0; i < m.start; i++) h += `<div class="cal-day empty"></div>`;
  for(let d = 1; d <= m.days; d++){
    const arr = H[m.key][d] || [];
    const maxH = arr.length ? Math.max(...arr) : null;
    const dws = arr.length ? dwsStatus(arr) : null;   // run the same rule engine used by render()
    const isNA = dws && dws.code === '🚫';             // forbidden days get a special full-red box
    h += `<div class="cal-day${d === curDay ? ' active' : ''}${isNA ? ' na' : ''}" data-d="${d}" onclick="pick(${d})"
      style="${dws ? `border-top:2px solid ${dws.color}${isNA ? '' : '60'}` : ''}${isNA ? ';background:rgba(231,76,60,.22)' : ''}">
      <div class="cdn">${d}</div>
      ${dws ? `<div class="cdws" style="color:${dws.color}">${dws.code}</div>` : ''}
      ${maxH !== null ? `<div class="cdmax">${maxH.toFixed(1)}</div>` : ''}
    </div>`;
  }
  document.getElementById('calgrid').innerHTML = h;
}

// Rebuilds the row of month buttons (Jan, Feb, Mar...) at the top, highlighting
// whichever month is currently selected. Clicking a button calls selMonth(i).
function renderTabs(){
  document.getElementById('tabs').innerHTML = MONTHS.map((m,i) =>
    (i === 6 ? '<div class="tab-break"></div>' : '') +
    `<button class="tab${i === mIdx ? ' active' : ''}" onclick="selMonth(${i})">${m.short}</button>`
  ).join('');
}

// Flips between French and English: swaps the `lang` variable, updates every
// fixed piece of text on the page directly, then re-runs render()/renderCal()
// so the day-specific text (labels, calendar headers) also switches language.
function toggleLang(){
  lang = lang === 'fr' ? 'en' : 'fr';
  document.getElementById('lang-tog').textContent = lang === 'fr' ? 'Fr' : 'En';
  document.getElementById('hdr-sub').textContent = TR[lang].sub;
  document.getElementById('hdr-badge').textContent = TR[lang].badge;
  document.getElementById('station-note-el').textContent = TR[lang].stationNote;
  document.getElementById('cal-title-el').textContent = TR[lang].calTitle;
  document.getElementById('legend-thresh').textContent = TR[lang].legendThresh;
  render();
  renderCal();
}
// Light/dark theme toggle — this page's own preference, saved in localStorage.
// Default (no class) follows the device via the prefers-color-scheme media query.
function toggleTheme(){
  var r = document.documentElement;
  var isDark = r.classList.contains('dark') || (!r.classList.contains('light') && window.matchMedia && matchMedia('(prefers-color-scheme:dark)').matches);
  r.classList.remove('dark','light');
  r.classList.add(isDark ? 'light' : 'dark');
  try{ localStorage.setItem('tide_theme', isDark ? 'light' : 'dark'); }catch(e){}
}
// Called when a month tab button is clicked: switch month, reset to day 1, redraw everything.
function selMonth(i){ mIdx=i; curDay=1; renderTabs(); renderCal(); render(); }
// Called when a calendar day box is clicked: select that day, redraw the chart/banner + calendar.
function pick(d){ curDay=d; render(); renderCal(); }
// Go back one day. If we're on day 1, roll back into the last day of the previous month instead.
function prevDay(){
  if(curDay>1){ curDay--; render(); renderCal(); }
  else if(mIdx>0){ mIdx--; curDay=MONTHS[mIdx].days; renderTabs(); renderCal(); render(); }
}
// Go forward one day. If we're on the last day of the month, roll into day 1 of the next month.
function nextDay(){
  if(curDay<MONTHS[mIdx].days){ curDay++; render(); renderCal(); }
  else if(mIdx<MONTHS.length-1){ mIdx++; curDay=1; renderTabs(); renderCal(); render(); }
}

// Init: draw the page for the very first time when it loads (using the default
// mIdx/curDay/lang values set above), before any click/tap has happened.
renderTabs(); renderCal(); render();

// Swipe on chart to change day (and auto-advance month).
// This is an IIFE ("Immediately Invoked Function Expression") - a function that
// runs itself right away. It's used here just to keep tx/ty/pinch as private
// variables that nothing else in the file can accidentally read or overwrite.
(function(){
  const el = document.getElementById('chart');
  let tx = 0, ty = 0, pinch = false; // tx/ty = where the touch started; pinch = "ignore this gesture"
  el.addEventListener('touchstart', e => {
    // If more than one finger touches the screen, it's a pinch-to-zoom gesture, not a
    // swipe - remember that and ignore it later in touchend, so zooming never flips the day.
    if (e.touches.length > 1) { pinch = true; return; }
    pinch = false;
    tx = e.touches[0].clientX;
    ty = e.touches[0].clientY;
  }, {passive: true});
  el.addEventListener('touchend', e => {
    if (pinch) return;
    const dx = e.changedTouches[0].clientX - tx; // how far the finger moved horizontally
    const dy = e.changedTouches[0].clientY - ty; // how far it moved vertically
    // Ignore tiny movements (under 40px) and movements that were more vertical than
    // horizontal (probably scrolling, not swiping left/right).
    if (Math.abs(dx) < 40 || Math.abs(dx) < Math.abs(dy)) return;
    dx < 0 ? nextDay() : prevDay(); // swiped left = next day, swiped right = previous day
  }, {passive: true});
})();

// Desktop: left/right arrow keys change day, same as swiping on mobile.
document.addEventListener('keydown', e => {
  if (e.key === 'ArrowLeft') { prevDay(); }
  else if (e.key === 'ArrowRight') { nextDay(); }
});
</script>
